kind = "mobile"
previewPath = "/"
title = "Sokoni — Intelligent Search Engine"
version = "1.0.0"
id = "artifacts/sokoni-search"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21253

[services.development]
run = "pnpm --filter @workspace/sokoni-search run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sokoni-search", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/sokoni-search", "run", "serve" ]

[services.env]
PORT = "21253"
BASE_PATH = "/"
