openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification for Doorstep Merchant Builder
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Merchant authentication
  - name: store
    description: Store management
  - name: products
    description: Product CRUD operations
  - name: import
    description: CSV/Excel import system

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Merchant Signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "200":
          description: Signup successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Merchant Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthCredentials"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current merchant profile
      responses:
        "200":
          description: Current merchant details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MerchantInfo"
        "410":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout merchant
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]

  /store:
    get:
      operationId: getStore
      tags: [store]
      summary: Get merchant store
      responses:
        "200":
          description: Store details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "404":
          description: Store not found
    post:
      operationId: createStore
      tags: [store]
      summary: Create merchant store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStoreInput"
      responses:
        "200":
          description: Store created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with pagination/filtering
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum: [name, price, stock, createdAt]
        - name: sortOrder
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
      responses:
        "200":
          description: Paginated product list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedProducts"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductInput"
      responses:
        "200":
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/bulk-delete:
    post:
      operationId: bulkDeleteProducts
      tags: [products]
      summary: Bulk delete products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items:
                    type: integer
              required: [ids]
      responses:
        "200":
          description: Bulk delete successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                required: [success, count]

  /products/{id}:
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductInput"
      responses:
        "200":
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required: [success]

  /import/upload:
    post:
      operationId: uploadImportFile
      tags: [import]
      summary: Upload product catalog file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required: [file]
      responses:
        "200":
          description: File parsed successfully, returns row-level preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadPreviewResponse"

  /import/confirm:
    post:
      operationId: confirmImport
      tags: [import]
      summary: Confirm and save imported products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filename:
                  type: string
                products:
                  type: array
                  items:
                    type: object
              required: [filename, products]
      responses:
        "200":
          description: Import processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                required: [success, count]

  /import/history:
    get:
      operationId: getImportHistory
      tags: [import]
      summary: Get past import history
      responses:
        "200":
          description: Import history logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UploadLog"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthCredentials:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        token:
          type: string
        merchant:
          $ref: "#/components/schemas/MerchantInfo"
      required:
        - success
        - token
        - merchant

    MerchantInfo:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
      required:
        - id
        - email

    Store:
      type: object
      properties:
        id:
          type: integer
        merchantId:
          type: integer
        name:
          type: string
        logoUrl:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - merchantId
        - name
        - createdAt
        - updatedAt

    CreateStoreInput:
      type: object
      properties:
        name:
          type: string
        logoUrl:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
      required:
        - name

    Product:
      type: object
      properties:
        id:
          type: integer
        merchantId:
          type: integer
        storeId:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
        stock:
          type: integer
        category:
          type: string
          nullable: true
        sku:
          type: string
        brand:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        discountPrice:
          type: number
          nullable: true
        weight:
          type: number
          nullable: true
        tags:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - merchantId
        - storeId
        - name
        - price
        - stock
        - sku
        - createdAt
        - updatedAt

    CreateProductInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
        stock:
          type: integer
        category:
          type: string
          nullable: true
        sku:
          type: string
        brand:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        discountPrice:
          type: number
          nullable: true
        weight:
          type: number
          nullable: true
        tags:
          type: string
          nullable: true
      required:
        - name
        - price
        - stock
        - sku

    UpdateProductInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
        stock:
          type: integer
        category:
          type: string
          nullable: true
        sku:
          type: string
        brand:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        discountPrice:
          type: number
          nullable: true
        weight:
          type: number
          nullable: true
        tags:
          type: string
          nullable: true

    PaginatedProducts:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
      required:
        - products
        - total
        - page
        - limit

    UploadPreviewResponse:
      type: object
      properties:
        success:
          type: boolean
        filename:
          type: string
        totalRows:
          type: integer
        previewRows:
          type: array
          items:
            type: object
        errors:
          type: array
          items:
            $ref: "#/components/schemas/RowValidationError"
      required:
        - success
        - filename
        - totalRows
        - previewRows
        - errors

    RowValidationError:
      type: object
      properties:
        row:
          type: integer
        sku:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        message:
          type: string
      required:
        - row
        - message

    UploadLog:
      type: object
      properties:
        id:
          type: integer
        merchantId:
          type: integer
        storeId:
          type: integer
        filename:
          type: string
        status:
          type: string
        totalRows:
          type: integer
        importedCount:
          type: integer
        failedCount:
          type: integer
        errors:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - merchantId
        - storeId
        - filename
        - status
        - totalRows
        - importedCount
        - failedCount
        - createdAt
